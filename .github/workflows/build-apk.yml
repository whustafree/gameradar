name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/freegamehub-release.keystore
            echo "Keystore created successfully"
          else
            echo "No keystore secret provided, APK will be unsigned"
          fi

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          if [ -f freegamehub-release.keystore ]; then
            export KEYSTORE_PATH="$GITHUB_WORKSPACE/android/freegamehub-release.keystore"
            export KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
          fi
          ./gradlew assembleRelease

      - name: Find APK
        if: always()
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APKs found"
          echo "---"
          echo "Checking standard location..."
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "Standard release dir not found"
          ls -la android/app/build/outputs/apk/ 2>/dev/null | head -20 || echo "APK output dir not found"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/**/*.apk
          name: FreeGameHub-Release
          if-no-files-found: warn
