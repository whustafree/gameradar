name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Restore custom app icon (prevent Capacitor overwrite)
        run: |
          git checkout -- android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          git checkout -- android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Create keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/freegamehub-release.keystore 2>/dev/null && echo "Keystore created" || echo "WARNING: Invalid base64"
          fi

      - name: Build Android (AAB + APKs)
        run: |
          cd android
          chmod +x gradlew
          if [ -f freegamehub-release.keystore ]; then
            export KEYSTORE_PATH="$GITHUB_WORKSPACE/android/freegamehub-release.keystore"
            export KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
          fi
          ./gradlew bundleRelease assembleRelease assembleDebug

      - name: Upload AAB (for Play Store)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          path: android/app/build/outputs/bundle/release/*.aab
          name: FreeGameHub-AAB
          if-no-files-found: warn

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          path: android/app/build/outputs/apk/release/*.apk
          name: FreeGameHub-Release
          if-no-files-found: warn

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          path: android/app/build/outputs/apk/debug/*.apk
          name: FreeGameHub-Debug
          if-no-files-found: warn
