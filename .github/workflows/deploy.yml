name: Auto-deploy to Vercel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: |
          npx vercel deploy \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope="prestafamilis-projects" \
            --project=gameradar \
            --prod \
            --yes \
            --archive=tgz \
            . 2>&1
